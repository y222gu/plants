<text x="3.800" y="7.300" font-size="2.47" text-anchor="start" font-weight="bold" fill="black">Variant</text>
<text x="93.000" y="7.300" font-size="2.47" text-anchor="middle" font-weight="bold" fill="black">(mean ± s.d., n = 185)</text>
<text x="93.000" y="4.200" font-size="2.47" text-anchor="middle" font-weight="bold" fill="black">In-distribution Test mIoU</text>
<text x="131.000" y="7.300" font-size="2.47" text-anchor="middle" font-weight="bold" fill="black">(mean ± s.d., n = 35)</text>
<text x="131.000" y="4.200" font-size="2.47" text-anchor="middle" font-weight="bold" fill="black">Out-of-distribution Test mIoU</text>
<line x1="3.000" y1="8.700" x2="149.000" y2="8.700" stroke="black" stroke-width="0.2"/>
<text x="3.800" y="12.700" font-size="2.47" text-anchor="start" font-weight="bold" font-style="italic" fill="black">Encoder training strategy</text>
